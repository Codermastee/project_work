<html>
<head>
<meta charset="UTF-8">
<title>Owner Key Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family:'Poppins',sans-serif;
    color:white;
    min-height:100vh;
}

.main-box{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:20px;
    margin-top:60px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.btn-main{
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    border:none;
    padding:12px 35px;
    border-radius:30px;
    font-weight:600;
    color:white;
}

.hash-card{
    background:rgba(255,255,255,0.08);
    border-left:4px solid #00c6ff;
    padding:18px;
    margin-top:15px;
    border-radius:10px;
    display:none;
    animation:fadeIn 1s ease;
}

.result-card{
    background:rgba(0,255,200,0.1);
    border-left:4px solid #00ffcc;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
    display:none;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

input,select{
    background:rgba(255,255,255,0.1) !important;
    border:none !important;
    color:white !important;
}

</style>
</head>

<body>

<div class="container">
<div class="main-box text-center">

<h4><i class="fa-solid fa-key"></i> Distributed Key Access</h4>

<button id="generateBtn" class="btn-main mt-3" onclick="generateKeys()">
<i class="fa-solid fa-lock"></i> Generate Key
</button>

<div id="hashSection"></div>

<div id="viewSection" style="display:none; margin-top:40px;">
    <hr>
    <h5>View Keys</h5>

    <select id="keyType" class="form-select mt-3">
        <option value="public">Public Key</option>
        <option value="private">Private Key</option>
    </select>

    <input type="text" id="masterInput" class="form-control mt-3" placeholder="Enter Master Key">

    <button class="btn-main mt-3" onclick="viewKey()">
        <i class="fa-solid fa-eye"></i> View Key
    </button>

    <div id="resultSection"></div>
</div>

</div>
</div>

<script>

const publicHash = "{{ data3.public_hash }}";
const privateHash = "{{ data3.private_hash }}";
const masterKey = "{{ data3.master_key }}";
const publicKey = "{{ data3.public_key }}";
const privateKey = "{{ data3.private_key }}";
const nodeHashes = {{ pr_hash|tojson }};
const nodeKeys = {{ data3.nodes|tojson }};

function delay(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function generateKeys(){

    document.getElementById("generateBtn").disabled = true;
    let container = document.getElementById("hashSection");
    container.innerHTML = "";

    await delay(2000);
    showHash(container,"Public Key Hash",publicHash);

    await delay(2000);
    showHash(container,"Private Key Hash",privateHash);

    for(let i=0;i<nodeHashes.length;i++){
        await delay(2000);
        showHash(container,"Node "+(i+1)+" Hash",nodeHashes[i]);
    }

    await delay(2000);
    showHash(container,"Master Key",masterKey);

    document.getElementById("viewSection").style.display="block";
}

function showHash(container,title,value){
    let div = document.createElement("div");
    div.className="hash-card";
    div.innerHTML="<strong>"+title+"</strong><br>"+value;
    container.appendChild(div);
    div.style.display="block";
}

async function viewKey(){

    let type = document.getElementById("keyType").value;
    let enteredMaster = document.getElementById("masterInput").value;
    let resultDiv = document.getElementById("resultSection");
    resultDiv.innerHTML="";

    if(type === "public"){

        await delay(1000);
        showResult(resultDiv,"Public Key",publicKey);
        return;
    }

    if(type === "private"){

        if(enteredMaster !== masterKey){
            alert("Invalid Master Key");
            return;
        }

        let shuffled = [...nodeKeys].sort(()=>0.5-Math.random()).slice(0,3);

        for(let i=0;i<shuffled.length;i++){
            await delay(2000);
            showResult(resultDiv,"Authorized Node Share",shuffled[i]);
        }
    }
}

function showResult(container,title,value){
    let div=document.createElement("div");
    div.className="result-card";
    div.innerHTML="<strong>"+title+"</strong><br>"+value;
    container.appendChild(div);
    div.style.display="block";
}

</script>

</body>
</html>
