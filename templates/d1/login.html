{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
<div class="card-box">
<h3 class="text-center mb-4"><i class="fa-solid fa-user-shield"></i> Admin Login</h3>
{% if msg %}
<div class="alert alert-danger text-center py-2">{{msg}}</div>
{% endif %}
<form name="form1" method="post">
    <input class="form-control mb-3" type="text" name="uname" placeholder="Username" required>
    <input class="form-control mb-3" type="password" name="pass" placeholder="Password" required>
    <button class="btn btn-main w-100">Login</button>
</form>
</div>
</div>
</div>
{% endblock %}
